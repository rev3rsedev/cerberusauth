# Release automation: `git tag vX.Y.Z && git push --tags` produces
# binaries for the three desktop platforms on GitHub Releases and a
# distroless image on ghcr.io. Run locally with `goreleaser release
# --snapshot --clean` to test without tagging.
version: 2

project_name: cerberusauth

builds:
  - id: cerberusd
    main: ./cmd/cerberusd
    binary: cerberusd
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md
      - .env.example

checksum:
  name_template: checksums.txt

dockers:
  - image_templates:
      - ghcr.io/rev3rsedev/cerberusauth:{{ .Version }}
      - ghcr.io/rev3rsedev/cerberusauth:latest
    dockerfile: Dockerfile.goreleaser
    build_flag_templates:
      - --label=org.opencontainers.image.source=https://github.com/rev3rsedev/cerberusauth
      - --label=org.opencontainers.image.version={{ .Version }}
      - --label=org.opencontainers.image.licenses=Elastic-2.0

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs"
      - "^test"

release:
  draft: false
  footer: |
    Verify downloads against checksums.txt. The Docker image runs as
    nonroot on distroless; see the README quickstart.
